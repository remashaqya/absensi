<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker In/Out Barang (Versi Stabil)</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#17a2b8">
    <meta name="mobile-web-app-capable" content="yes">
    
    <script src="data.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; background-color: #f4f4f9; padding-bottom: 80px; }
        #scanner-container { width: 100%; max-width: 500px; border: 2px solid #ccc; padding: 15px; border-radius: 10px; background: white; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); text-align: center; box-sizing: border-box; }
        
        #video-wrapper { position: relative; width: 100%; height: 250px; overflow: hidden; border-radius: 10px; background-color: #000; margin-bottom: 10px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scan-area { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 60%; border: 3px dashed rgba(0, 255, 0, 0.7); border-radius: 10px; box-sizing: border-box; pointer-events: none; }
        .scan-line { position: absolute; width: 75%; height: 3px; background: red; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px red; pointer-events: none; animation: scan 3.5s infinite linear; }
        @keyframes scan { 0% { top: 25%; } 50% { top: 75%; } 100% { top: 25%; } }

        #camera-selector { width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
        .btn { padding: 10px 15px; font-size: 14px; cursor: pointer; color: white; border: none; border-radius: 5px; margin: 5px 0; width: 100%; box-sizing: border-box; font-weight: bold; }
        .btn-scan { background-color: #17a2b8; }
        .btn-success { background-color: #28a745; }
        .btn-danger { background-color: #dc3545; }
        .btn-warning { background-color: #ffc107; color: black; }
        
        #output { margin-top: 15px; padding: 15px; border-radius: 5px; text-align: center; display: none; border: 1px solid transparent; }
        .out-danger { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        
        #result-list { text-align: left; max-height: 400px; overflow-y: auto; border-top: 1px solid #ddd; padding-top: 10px; margin-top: 15px; width: 100%; max-width: 500px; }
        .log-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 14px; }
        .nama-teks { font-size: 16px; font-weight: bold; color: #333; }
        .status-badge { padding: 3px 8px; border-radius: 12px; font-size: 12px; color: white; display: inline-block; margin-top: 5px;}
        .badge-pinjam { background: #ffc107; color: black;}
        .badge-kembali { background: #28a745; }

        /* MODAL CSS */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 2000; justify-content: center; align-items: center; }
        #modal-box { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); text-align: left; max-height: 90vh; overflow-y: auto;}
        #modal-box h3 { margin-top: 0; color: #333; border-bottom: 1px solid #ccc; padding-bottom: 10px;}
        .active-loans { background: #fff3cd; border: 1px solid #ffeeba; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        .active-loan-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; border-bottom: 1px dashed #ccc; padding-bottom: 5px;}
        .form-group { margin-bottom: 10px; display: flex; gap: 10px; align-items: center;}
        .form-group select { flex: 2; padding: 8px; border-radius: 5px; border: 1px solid #ccc;}
        .form-group input { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ccc; text-align: center;}

        /* CSS POPUP BERHASIL (TOAST) */
        #toast-success {
            display: none; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            background: #28a745; color: white; padding: 20px 30px; border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 3000; font-size: 18px; font-weight: bold;
            text-align: center; border: 3px solid #fff;
        }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 10px; text-align: center;">Sistem In/Out Barang<br><small style="font-size: 16px; color: #666;">Remaja Masjid Wakaf Haqqul Yaqin Dinoyo</small></h2>

    <div id="scanner-container">
        <select id="camera-selector"></select>
        
        <div id="video-wrapper">
            <video id="qr-video" playsinline autoplay muted></video>
            <div class="scan-area"></div>
            <div class="scan-line" id="scan-line" style="display:none;"></div>
        </div>
        
        <button id="scan-button" class="btn btn-scan">Mulai Scanner</button>
        <button id="stop-button" class="btn btn-danger" style="display:none;">Matikan Kamera</button>
        
        <div id="output"><h3 id="output-nama" style="margin: 0;">Status</h3></div>
    </div>

    <div style="width: 100%; max-width: 500px;">
        <button onclick="exportToCSV()" class="btn btn-success" style="margin-top: 15px;">⬇️ Download Laporan (CSV)</button>
        <button onclick="clearData()" class="btn btn-danger">🗑️ Kosongkan Riwayat</button>

        <h3 style="margin-bottom: 5px; margin-top: 20px;">Daftar Aktivitas:</h3>
        <div id="result-list"></div>
    </div>

    <div id="modal-overlay">
        <div id="modal-box">
            <h3>Aktivitas Anggota</h3>
            <p style="margin-top:0; font-size:15px; color:#555;">
                Nama: <b id="m-nama" style="color:#000;"></b><br>
                ID: <b id="m-id" style="color:#000;"></b>
            </p>
            
            <div id="return-section" class="active-loans" style="display:none;">
                <strong style="display:block; margin-bottom:8px; color:#856404;">⚠️ Sedang Dipinjam:</strong>
                <div id="active-loan-list"></div>
            </div>

            <hr style="border:0; border-top:1px solid #ccc; margin: 15px 0;">
            
            <strong style="display:block; margin-bottom:8px;">➕ Pinjam Barang Baru:</strong>
            
            <div class="form-group">
                <select id="m-item">
                    <option value="Pisau Kecil">Pisau Kecil</option>
                    <option value="Pisau Besar">Pisau Besar</option>
                    <option value="Kapak">Kapak</option>
                </select>
                <input type="number" id="m-qty" value="1" min="1">
            </div>
            
            <button onclick="pinjamBarang()" class="btn btn-scan" style="margin-bottom:15px;">Pinjam Barang</button>
            <button onclick="tutupModal()" class="btn btn-danger">Batal / Tutup</button>
        </div>
    </div>

    <div id="toast-success">✅ Berhasil!</div>

    <script>
        const dbAnggota = typeof dataAnggota !== 'undefined' ? dataAnggota : {};
        const videoElement = document.getElementById('qr-video');
        const cameraSelector = document.getElementById('camera-selector');
        const scanLine = document.getElementById('scan-line');
        const modalOverlay = document.getElementById('modal-overlay');
        const toastSuccess = document.getElementById('toast-success');
        
        let currentStream = null;
        let isScanning = false;
        let isModalOpen = false;
        
        let trackingData = JSON.parse(localStorage.getItem('tracker_inout_v2')) || []; 
        let tempId = "", tempNama = "";

        updateUI();

        // ----------------- AUDIO FIX -----------------
        // Memakai SATU konteks audio global agar memori tidak penuh dan suara tidak macet
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeep() {
            try {
                initAudio();
                const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(850, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } catch (e) { console.error("Audio error:", e); }
        }

        function playSuccessSound() {
            try {
                initAudio();
                // Nada 1
                const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain();
                osc1.type = 'triangle'; osc1.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain1.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc1.connect(gain1); gain1.connect(audioCtx.destination);
                osc1.start(); osc1.stop(audioCtx.currentTime + 0.1);
                
                // Nada 2 
                const osc2 = audioCtx.createOscillator(); const gain2 = audioCtx.createGain();
                osc2.type = 'triangle'; osc2.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain2.gain.setValueAtTime(0.5, audioCtx.currentTime + 0.1);
                gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc2.connect(gain2); gain2.connect(audioCtx.destination);
                osc2.start(audioCtx.currentTime + 0.1); osc2.stop(audioCtx.currentTime + 0.3);
            } catch (e) { console.error("Audio error:", e); }
        }
        // ---------------------------------------------

        function tunjukkanPesanBerhasil(pesan) {
            toastSuccess.innerHTML = `✅ ${pesan}`;
            toastSuccess.style.display = 'block';
            setTimeout(() => { toastSuccess.style.display = 'none'; }, 500); 
        }

        navigator.mediaDevices.enumerateDevices().then(devices => {
            const videoDevices = devices.filter(device => device.kind === 'videoinput');
            videoDevices.forEach((device, index) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.textContent = device.label || `Kamera ${index + 1}`;
                cameraSelector.appendChild(option);
            });
        });

        cameraSelector.addEventListener('change', () => { if (isScanning) startCamera(cameraSelector.value); });

        function startCamera(cameraId) {
            initAudio(); // Inisiasi audio saat tombol ditekan oleh user
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            navigator.mediaDevices.getUserMedia({ video: { deviceId: cameraId ? { exact: cameraId } : undefined, facingMode: "environment" } })
                .then(stream => {
                    currentStream = stream; videoElement.srcObject = stream; videoElement.play();
                    isScanning = true; document.getElementById('scan-button').style.display = "none"; document.getElementById('stop-button').style.display = "block"; scanLine.style.display = "block"; 
                    scanOffline();
                }).catch(err => alert('Gagal akses kamera: ' + err.message));
        }

        function stopCamera() {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            isScanning = false; document.getElementById('scan-button').style.display = "block"; document.getElementById('stop-button').style.display = "none"; scanLine.style.display = "none"; 
        }

        async function scanOffline() {
            if (!isScanning || isModalOpen) {
                requestAnimationFrame(scanOffline); return; 
            }

            if ("BarcodeDetector" in window) {
                const detector = new BarcodeDetector({ formats: ["qr_code", "ean_13", "code_128"] });
                try {
                    const barcodes = await detector.detect(videoElement);
                    if (barcodes.length > 0) {
                        const idData = barcodes[0].rawValue;
                        const dataDitemukan = dbAnggota[idData];
                            
                        if (!dataDitemukan) {
                            isModalOpen = true; 
                            document.getElementById('output').className = "out-danger";
                            document.getElementById('output-nama').innerText = "⚠️ ID " + idData + " tidak terdaftar!";
                            document.getElementById('output').style.display = "block";
                            if (navigator.vibrate) navigator.vibrate([100, 100, 100]); 
                            setTimeout(() => { isModalOpen = false; document.getElementById('output').style.display = "none"; }, 1200);
                        } else {
                            playBeep();
                            bukaModal(idData, dataDitemukan.nama || "Tanpa Nama");
                        }
                    }
                } catch (e) { }
            }
            requestAnimationFrame(scanOffline);
        }

        function getWaktuSekarang() {
            const now = new Date();
            return now.toLocaleDateString('id-ID') + ' ' + now.toLocaleTimeString('id-ID');
        }

        function bukaModal(id, nama) {
            isModalOpen = true; tempId = id; tempNama = nama;
            document.getElementById('m-nama').innerText = nama; document.getElementById('m-id').innerText = id;
            document.getElementById('m-qty').value = 1;
            
            const barangDipinjam = trackingData.filter(row => row.id === id && row.status === "Dipinjam");
            const returnSection = document.getElementById('return-section');
            const listContainer = document.getElementById('active-loan-list');
            listContainer.innerHTML = '';

            if (barangDipinjam.length > 0) {
                returnSection.style.display = "block";
                
                if (barangDipinjam.length > 1) {
                    listContainer.innerHTML += `
                        <button onclick="kembalikanSemuaBarang('${id}')" class="btn btn-warning" style="margin-bottom: 12px; font-size:13px;">⬇️ Kembalikan Semua (${barangDipinjam.length} Barang)</button>
                    `;
                }

                barangDipinjam.forEach(row => {
                    listContainer.innerHTML += `
                        <div class="active-loan-item">
                            <span>📦 ${row.item} (Qty: ${row.qty})</span>
                            <button onclick="kembalikanBarang('${row.id_aktivitas}')" class="btn btn-success" style="width:auto; padding:5px 10px; margin:0; font-size:12px;">Kembalikan</button>
                        </div>
                    `;
                });
            } else {
                returnSection.style.display = "none";
            }
            modalOverlay.style.display = 'flex';
        }

        function tutupModal() {
            modalOverlay.style.display = 'none';
            setTimeout(() => { isModalOpen = false; }, 300);
        }

        function pinjamBarang() {
            const itemDipilih = document.getElementById('m-item').value;
            const jumlah = document.getElementById('m-qty').value;

            const isDuplicate = trackingData.some(row => row.id === tempId && row.item === itemDipilih && row.status === "Dipinjam");
            if (isDuplicate) {
                alert(`Anggota ini sedang meminjam ${itemDipilih} dan belum dikembalikan!`);
                return;
            }
            if (jumlah < 1) {
                alert("Jumlah minimal 1");
                return;
            }

            trackingData.push({ 
                id_aktivitas: 'AKT-' + Date.now(),
                id: tempId, nama: tempNama, item: itemDipilih, qty: jumlah,
                waktu_pinjam: getWaktuSekarang(),
                waktu_kembali: "-",
                status: "Dipinjam"
            });
            
            localStorage.setItem('tracker_inout_v2', JSON.stringify(trackingData)); 
            updateUI(); 
            playSuccessSound();
            tunjukkanPesanBerhasil("Tersimpan!");
            tutupModal();
        }

        function kembalikanBarang(idAktivitas) {
            const index = trackingData.findIndex(row => row.id_aktivitas === idAktivitas);
            if(index !== -1) {
                trackingData[index].status = "Dikembalikan";
                trackingData[index].waktu_kembali = getWaktuSekarang();
                localStorage.setItem('tracker_inout_v2', JSON.stringify(trackingData));
                
                updateUI(); 
                playSuccessSound();
                tunjukkanPesanBerhasil("Dikembalikan!");
                tutupModal();
            }
        }

        function kembalikanSemuaBarang(idAnggota) {
            let totalBarang = 0;
            trackingData.forEach((row, index) => {
                if (row.id === idAnggota && row.status === "Dipinjam") {
                    trackingData[index].status = "Dikembalikan";
                    trackingData[index].waktu_kembali = getWaktuSekarang();
                    totalBarang++;
                }
            });

            if (totalBarang > 0) {
                localStorage.setItem('tracker_inout_v2', JSON.stringify(trackingData));
                
                updateUI(); 
                playSuccessSound();
                tunjukkanPesanBerhasil("Semua Dikembalikan!");
                tutupModal();
            }
        }

        function updateUI() {
            const list = document.getElementById('result-list');
            list.innerHTML = '';
            [...trackingData].reverse().forEach((row) => {
                let badgeClass = row.status === "Dipinjam" ? "badge-pinjam" : "badge-kembali";
                list.innerHTML += `
                <div class="log-item">
                    <span class="nama-teks">${row.nama} <small style="color:#666;">(${row.id})</small></span><br>
                    <span>📦 ${row.item} (Jumlah: ${row.qty})</span> <span class="status-badge ${badgeClass}">${row.status}</span><br>
                    <div style="font-size: 12px; color: #555; margin-top:5px;">
                        ⬆️ Pinjam: ${row.waktu_pinjam} <br>
                        ⬇️ Kembali: ${row.waktu_kembali}
                    </div>
                </div>`;
            });
        }

        function exportToCSV() {
            if (trackingData.length === 0) return alert("Belum ada data!");
            
            // KATA TRANSAKSI DIGANTI AKTIVITAS DI HEADER CSV
            let csvContent = "data:text/csv;charset=utf-8,ID Aktivitas,ID Anggota,Nama Anggota,Barang,Jumlah,Status,Waktu Pinjam,Waktu Kembali\n";
            trackingData.forEach(row => { 
                csvContent += `"${row.id_aktivitas}","${row.id}","${row.nama}","${row.item}","${row.qty}","${row.status}","${row.waktu_pinjam}","${row.waktu_kembali}"\n`; 
            });
            const link = document.createElement("a"); 
            link.setAttribute("href", encodeURI(csvContent)); 
            link.setAttribute("download", `Laporan_Aktivitas_${new Date().getTime()}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        function clearData() {
            // KATA TRANSAKSI DIGANTI AKTIVITAS
            if(confirm("Hapus semua riwayat aktivitas ini?")) {
                localStorage.removeItem('tracker_inout_v2'); trackingData = []; updateUI();
            }
        }

        document.getElementById('scan-button').addEventListener('click', () => startCamera(cameraSelector.value));
        document.getElementById('stop-button').addEventListener('click', stopCamera);
    </script>
</body>
</html>
