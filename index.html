<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Absensi (Versi 6.1)</title>
    <!-- Memanggil data anggota dari file terpisah -->
    <script src="data.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            background-color: #f4f4f9;
        }
        #scanner-container {
            width: 100%; max-width: 500px;
            border: 2px solid #ccc; padding: 15px;
            border-radius: 10px; background: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center; box-sizing: border-box;
        }
        
        #video-wrapper {
            position: relative; width: 100%; height: 250px; 
            overflow: hidden; border-radius: 10px;
            background-color: #000; margin-bottom: 10px;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .scan-area {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 60%; border: 3px dashed rgba(0, 255, 0, 0.7);
            border-radius: 10px; box-sizing: border-box; pointer-events: none;
        }
        .scan-line {
            position: absolute; width: 75%; height: 3px; background: red;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px red; pointer-events: none;
            animation: scan 3.5s infinite linear;
        }
        @keyframes scan { 0% { top: 25%; } 50% { top: 75%; } 100% { top: 25%; } }

        #camera-selector {
            width: 100%; margin-bottom: 10px; padding: 10px;
            border-radius: 5px; border: 1px solid #ccc; font-size: 16px;
        }
        .btn {
            padding: 12px 20px; font-size: 16px; cursor: pointer;
            color: white; border: none; border-radius: 5px; margin: 5px 0;
            width: 100%; box-sizing: border-box; font-weight: bold;
        }
        .btn-scan { background-color: #6c63ff; }
        .btn-scan:hover { background-color: #5750d9; }
        .btn-success { background-color: #28a745; margin-top: 15px;}
        .btn-warning { background-color: #ffc107; color: #333; margin-top: 5px;} /* Tombol Baru */
        .btn-danger { background-color: #dc3545; }
        
        #output {
            margin-top: 15px; padding: 15px; border-radius: 5px; text-align: center; display: none; border: 1px solid transparent;
        }
        #output h3 { margin: 0 0 5px 0; font-size: 18px;}
        #output p { margin: 0; font-size: 14px;}
        
        .out-success { background: #d4edda; border-color: #c3e6cb; color: #155724; }
        .out-warning { background: #fff3cd; border-color: #ffeeba; color: #856404; }
        .out-danger { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        
        #result-list, #unattended-list {
            text-align: left; max-height: 250px; overflow-y: auto;
            border-top: 1px solid #ddd; padding-top: 10px; margin-top: 15px;
            width: 100%; max-width: 500px;
        }
        .log-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 14px; }
        .nama-teks { font-size: 16px; font-weight: bold; color: #333; }
        .id-teks { color: #888; font-size: 12px; }
        .ket-badge { background: #17a2b8; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; margin-left: 5px; }
        
        /* Box untuk yang belum hadir */
        #unattended-box {
            display: none; margin-top: 15px; padding: 15px; background: #fff3cd; 
            border: 1px solid #ffeeba; border-radius: 8px; text-align: left; width: 100%; max-width: 500px; box-sizing: border-box;
        }
        #unattended-box h3 { margin: 0 0 10px 0; color: #856404; font-size: 16px;}
    </style>
</head>
<body>

    <h2 style="margin-bottom: 10px; text-align: center;">Scanner Absensi<br><small style="font-size: 14px; color: #666;">Remaja Masjid Wakaf Haqqul Yaqin Dinoyo</small><br><small style="font-size: 14px; color: #666; font-style: italic;">(Versi 6.1 - Filter Kehadiran)</small></h2>

    <div id="scanner-container">
        <select id="camera-selector"></select>
        
        <div id="video-wrapper">
            <video id="qr-video" playsinline autoplay muted></video>
            <div class="scan-area"></div>
            <div class="scan-line" id="scan-line" style="display:none;"></div>
        </div>
        
        <button id="scan-button" class="btn btn-scan">Mulai Scanner</button>
        <button id="stop-button" class="btn btn-danger" style="display:none;">Matikan Kamera</button>
        
        <div id="output">
            <h3 id="output-nama">Status</h3>
            <p id="output-id">Keterangan</p>
        </div>
    </div>

    <!-- Tombol Aksi -->
    <div style="width: 100%; max-width: 500px;">
        <button onclick="exportToCSV()" class="btn btn-success">⬇️ Download Data CSV</button>
        <button onclick="cekBelumHadir()" class="btn btn-warning">🔍 Cek Belum Hadir</button>
        <button onclick="clearData()" class="btn btn-danger" style="margin-top: 5px;">🗑️ Kosongkan Data Absen</button>
        
        <!-- Wadah List Belum Hadir (Awalnya Tersembunyi) -->
        <div id="unattended-box">
            <h3>Daftar Belum Hadir:</h3>
            <div id="unattended-list"></div>
        </div>

        <h3 style="margin-bottom: 5px; margin-top: 20px;">Riwayat Kehadiran:</h3>
        <div id="result-list"></div>
    </div>

    <script>
        // --- 1. INISIALISASI DATA ---
        // Mengambil data dari data.js. Jika file tidak ada, set kosong agar tidak error.
        const dbAnggota = typeof dataAnggota !== 'undefined' ? dataAnggota : {};

        // --- 2. SISTEM APLIKASI ---
        const videoElement = document.getElementById('qr-video');
        const cameraSelector = document.getElementById('camera-selector');
        const scanButton = document.getElementById('scan-button');
        const stopButton = document.getElementById('stop-button');
        const outputBox = document.getElementById('output');
        const scanLine = document.getElementById('scan-line');
        const unattendedBox = document.getElementById('unattended-box');
        
        let currentStream = null;
        let isScanning = false;
        let lastScanned = "";
        
        let attendanceData = JSON.parse(localStorage.getItem('absensi_anggota_v6')) || [];
        
        updateUI();

        // --- FUNGSI SUARA BEEP ---
        function playBeep() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(850, ctx.currentTime);
                
                gainNode.gain.setValueAtTime(1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.15);
            } catch (e) { console.log("Beep error:", e); }
        }

        function showNotification(judul, keterangan, tipeKelas) {
            outputBox.className = tipeKelas; 
            document.getElementById('output-nama').innerText = judul;
            document.getElementById('output-id').innerText = keterangan;
            outputBox.style.display = "block";
        }

        // --- SETUP KAMERA ---
        navigator.mediaDevices.enumerateDevices().then(devices => {
            const videoDevices = devices.filter(device => device.kind === 'videoinput');
            if (videoDevices.length > 0) {
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.textContent = device.label || `Kamera ${index + 1}`;
                    cameraSelector.appendChild(option);
                });
            }
        }).catch(err => console.error(err));

        cameraSelector.addEventListener('change', () => { if (isScanning) startCamera(cameraSelector.value); });

        function startCamera(cameraId) {
            if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); }
            navigator.mediaDevices.getUserMedia({ video: { deviceId: cameraId ? { exact: cameraId } : undefined, facingMode: "environment" } })
                .then(stream => {
                    currentStream = stream; videoElement.srcObject = stream; videoElement.play();
                    isScanning = true; scanButton.style.display = "none"; stopButton.style.display = "block"; scanLine.style.display = "block"; 
                    scanOffline();
                }).catch(err => alert('Gagal akses kamera: ' + err.message));
        }

        function stopCamera() {
            if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); videoElement.srcObject = null; }
            isScanning = false; scanButton.style.display = "block"; stopButton.style.display = "none"; scanLine.style.display = "none"; 
        }

        // --- PEMINDAI BARCODE ---
        async function scanOffline() {
            if (!isScanning) return;

            if ("BarcodeDetector" in window) {
                const barcodeDetector = new BarcodeDetector({ formats: ["qr_code", "ean_13", "code_128"] });
                try {
                    const barcodes = await barcodeDetector.detect(videoElement);
                    if (barcodes.length > 0) {
                        const idData = barcodes[0].rawValue;
                        
                        if (idData !== lastScanned) {
                            lastScanned = idData;
                            
                            // Ambil data dari variabel dbAnggota (dari data.js)
                            const dataDitemukan = dbAnggota[idData];
                            
                            if (!dataDitemukan) {
                                showNotification("⚠️ Ditolak", "ID " + idData + " tidak terdaftar!", "out-danger");
                                if (navigator.vibrate) navigator.vibrate([100, 100, 100]); 
                            } else {
                                const namaAnggota = dataDitemukan.nama || "Tanpa Nama";
                                const ketAnggota = dataDitemukan.keterangan || "-";
                                const sudahAbsen = attendanceData.some(item => item.id === idData);
                                
                                if (sudahAbsen) {
                                    showNotification("⚠️ Sudah Absen", namaAnggota + " (" + idData + ")", "out-warning");
                                    if (navigator.vibrate) navigator.vibrate([50, 50, 50]); 
                                } else {
                                    playBeep();
                                    const infoTambahan = ketAnggota !== "-" ? ketAnggota + " | " : "";
                                    showNotification("✅ " + namaAnggota, infoTambahan + "ID: " + idData, "out-success");
                                    simpanKeDatabase(idData, namaAnggota, ketAnggota);
                                }
                            }
                            setTimeout(() => { lastScanned = ""; }, 2500); 
                        }
                    }
                } catch (e) { }
            }
            requestAnimationFrame(scanOffline);
        }

        // --- PENYIMPANAN DATA ---
        function simpanKeDatabase(idData, nama, keterangan) {
            const now = new Date();
            const timeString = now.toLocaleDateString('id-ID') + ' ' + now.toLocaleTimeString('id-ID');
            
            attendanceData.push({ id: idData, nama: nama, waktu: timeString, keterangan: keterangan });
            localStorage.setItem('absensi_anggota_v6', JSON.stringify(attendanceData)); 
            
            // Jika box belum hadir sedang terbuka, otomatis diupdate/ditutup
            if (unattendedBox.style.display === "block") cekBelumHadir(true);
            
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('result-list');
            list.innerHTML = '';
            [...attendanceData].reverse().forEach((item, index) => {
                let nomorUrut = attendanceData.length - index;
                let badgeKet = item.keterangan !== "-" ? `<span class="ket-badge">${item.keterangan}</span>` : "";
                
                list.innerHTML += `
                <div class="log-item">
                    <span class="nama-teks">${nomorUrut}. ${item.nama}</span> ${badgeKet}<br>
                    <span class="id-teks">ID: ${item.id} | ${item.waktu}</span>
                </div>`;
            });
        }

        // --- FITUR CEK BELUM HADIR ---
        function cekBelumHadir(forceUpdate = false) {
            const listBelumHadir = document.getElementById('unattended-list');
            
            // Logika Buka/Tutup (Toggle)
            if (unattendedBox.style.display === "block" && !forceUpdate) {
                unattendedBox.style.display = "none";
                return;
            }

            listBelumHadir.innerHTML = '';
            let jumlahBelumHadir = 0;

            // Looping seluruh data di data.js
            for (let id in dbAnggota) {
                const sudahAbsen = attendanceData.some(item => item.id === id);
                
                if (!sudahAbsen) {
                    jumlahBelumHadir++;
                    let nama = dbAnggota[id].nama || "Tanpa Nama";
                    let ket = dbAnggota[id].keterangan || "-";
                    let badgeKet = ket !== "-" ? `<span class="ket-badge" style="background: #6c757d;">${ket}</span>` : "";
                    
                    listBelumHadir.innerHTML += `
                    <div class="log-item" style="border-bottom: 1px solid #ffeeba; color: #856404;">
                        <span class="nama-teks">${jumlahBelumHadir}. ${nama}</span> ${badgeKet}<br>
                        <span class="id-teks">ID: ${id}</span>
                    </div>`;
                }
            }

            if (jumlahBelumHadir === 0) {
                listBelumHadir.innerHTML = "<i>Semua anggota telah hadir! 🎉</i>";
            }

            unattendedBox.style.display = "block";
        }

        // --- EKSPOR KE CSV (Hadir & Belum Hadir) ---
        function exportToCSV() {
            if (Object.keys(dbAnggota).length === 0) return alert("Belum ada data anggota di file data.js!");
            
            let csvContent = "data:text/csv;charset=utf-8,ID Anggota,Nama Anggota,Tanggal & Jam,Keterangan\n";
            
            // 1. Tulis yang sudah hadir
            attendanceData.forEach(row => { 
                csvContent += `"${row.id}","${row.nama}","${row.waktu}","${row.keterangan}"\n`; 
            });
            
            // 2. Tulis yang BELUM hadir dengan status "Tidak Hadir"
            for (let id in dbAnggota) {
                const sudahAbsen = attendanceData.some(item => item.id === id);
                if (!sudahAbsen) {
                    let nama = dbAnggota[id].nama || "Tanpa Nama";
                    let ket = dbAnggota[id].keterangan || "-";
                    // Memasukkan keterangan "Tidak Hadir" di kolom Waktu
                    csvContent += `"${id}","${nama}","Tidak Hadir","${ket}"\n`;
                }
            }
            
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const tanggalSekarang = new Date().toLocaleDateString('id-ID', options);
            const fileName = `Laporan Absensi_${tanggalSekarang}.csv`;
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", fileName);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- KOSONGKAN DATA ---
        function clearData() {
            if(confirm("Hapus semua riwayat absensi lokal ini?")) {
                localStorage.removeItem('absensi_anggota_v6');
                attendanceData = [];
                outputBox.style.display = "none";
                unattendedBox.style.display = "none"; // Tutup juga box belum hadir
                updateUI();
            }
        }

        scanButton.addEventListener('click', () => startCamera(cameraSelector.value));
        stopButton.addEventListener('click', stopCamera);
        window.addEventListener('beforeunload', stopCamera);

    </script>
</body>
</html>
