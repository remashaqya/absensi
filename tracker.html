<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Barang (Versi 1.0)</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6c63ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="data.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            background-color: #f4f4f9; padding-bottom: 80px;
        }
        #scanner-container {
            width: 100%; max-width: 500px;
            border: 2px solid #ccc; padding: 15px;
            border-radius: 10px; background: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center; box-sizing: border-box;
        }
        
        #video-wrapper {
            position: relative; width: 100%; height: 250px; 
            overflow: hidden; border-radius: 10px;
            background-color: #000; margin-bottom: 10px;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .scan-area {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 60%; border: 3px dashed rgba(0, 255, 0, 0.7);
            border-radius: 10px; box-sizing: border-box; pointer-events: none;
        }
        .scan-line {
            position: absolute; width: 75%; height: 3px; background: red;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px red; pointer-events: none;
            animation: scan 3.5s infinite linear;
        }
        @keyframes scan { 0% { top: 25%; } 50% { top: 75%; } 100% { top: 25%; } }

        #camera-selector {
            width: 100%; margin-bottom: 10px; padding: 10px;
            border-radius: 5px; border: 1px solid #ccc; font-size: 16px;
        }
        .btn {
            padding: 12px 20px; font-size: 16px; cursor: pointer;
            color: white; border: none; border-radius: 5px; margin: 5px 0;
            width: 100%; box-sizing: border-box; font-weight: bold;
        }
        .btn-scan { background-color: #6c63ff; }
        .btn-scan:hover { background-color: #5750d9; }
        .btn-success { background-color: #28a745; margin-top: 15px;}
        .btn-danger { background-color: #dc3545; }
        
        #output {
            margin-top: 15px; padding: 15px; border-radius: 5px; text-align: center; display: none; border: 1px solid transparent;
        }
        .out-danger { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        
        #result-list {
            text-align: left; max-height: 300px; overflow-y: auto;
            border-top: 1px solid #ddd; padding-top: 10px; margin-top: 15px;
            width: 100%; max-width: 500px;
        }
        .log-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 14px; }
        .nama-teks { font-size: 16px; font-weight: bold; color: #333; }
        .id-teks { color: #888; font-size: 12px; }
        .item-badge { background: #6c63ff; color: white; padding: 3px 8px; border-radius: 12px; font-size: 12px; margin-top: 5px; display: inline-block; }

        /* CSS UNTUK POPUP/MODAL */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); z-index: 2000; justify-content: center; align-items: center;
        }
        #modal-box {
            background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 350px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); text-align: left;
        }
        #modal-box h3 { margin-top: 0; color: #333; border-bottom: 1px solid #ccc; padding-bottom: 10px;}
        .modal-info { font-size: 16px; margin-bottom: 15px; color: #555;}
        .modal-info span { font-weight: bold; color: #000; }
        .form-group { margin-bottom: 15px; display: flex; gap: 10px; align-items: center;}
        .form-group label { flex: 1; font-weight: bold; font-size: 14px;}
        .form-group select { flex: 2; padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px;}
        .form-group input { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; text-align: center;}
        .modal-btns { display: flex; gap: 10px; margin-top: 20px;}
    </style>
</head>
<body>

    <h2 style="margin-bottom: 10px; text-align: center;">Tracker Barang<br><small style="font-size: 16px; color: #666;">Remaja Masjid Wakaf Haqqul Yaqin</small></h2>

    <div id="scanner-container">
        <select id="camera-selector"></select>
        
        <div id="video-wrapper">
            <video id="qr-video" playsinline autoplay muted></video>
            <div class="scan-area"></div>
            <div class="scan-line" id="scan-line" style="display:none;"></div>
        </div>
        
        <button id="scan-button" class="btn btn-scan">Mulai Scanner</button>
        <button id="stop-button" class="btn btn-danger" style="display:none;">Matikan Kamera</button>
        
        <div id="output">
            <h3 id="output-nama" style="margin: 0;">Status</h3>
        </div>
    </div>

    <div style="width: 100%; max-width: 500px;">
        <button onclick="exportToCSV()" class="btn btn-success">⬇️ Download Laporan (CSV)</button>
        <button onclick="clearData()" class="btn btn-danger" style="margin-top: 5px;">🗑️ Kosongkan Riwayat</button>

        <h3 style="margin-bottom: 5px; margin-top: 20px;">Riwayat Transaksi:</h3>
        <div id="result-list"></div>
    </div>

    <div id="modal-overlay">
        <div id="modal-box">
            <h3>Pilih Barang</h3>
            <div class="modal-info">
                Nama: <span id="m-nama"></span><br>
                ID: <span id="m-id"></span>
            </div>
            
            <div class="form-group">
                <label>Barang:</label>
                <select id="m-item">
                    <option value="Mic / Sound">Mic / Sound</option>
                    <option value="Karpet / Tikar">Karpet / Tikar</option>
                    <option value="Kabel Roll">Kabel Roll</option>
                    <option value="Proyektor">Proyektor</option>
                    <option value="Kunci Ruangan">Kunci Ruangan</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Jumlah:</label>
                <input type="number" id="m-qty" value="1" min="1">
            </div>

            <div class="modal-btns">
                <button onclick="simpanTransaksi()" class="btn btn-success" style="margin:0;">OK Simpan</button>
                <button onclick="tutupModal()" class="btn btn-danger" style="margin:0;">Batal</button>
            </div>
        </div>
    </div>

    <script>
        // Memastikan Service Worker tetap jalan jika ada
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
            });
        }

        const dbAnggota = typeof dataAnggota !== 'undefined' ? dataAnggota : {};

        const videoElement = document.getElementById('qr-video');
        const cameraSelector = document.getElementById('camera-selector');
        const scanButton = document.getElementById('scan-button');
        const stopButton = document.getElementById('stop-button');
        const outputBox = document.getElementById('output');
        const scanLine = document.getElementById('scan-line');
        const modalOverlay = document.getElementById('modal-overlay');
        
        let currentStream = null;
        let isScanning = false;
        let isModalOpen = false; // Mencegah scan berulang saat modal terbuka
        
        // Simpan data di local storage terpisah dari absensi
        let trackingData = JSON.parse(localStorage.getItem('tracker_barang_v1')) || []; 
        
        // Variabel penampung sementara saat modal terbuka
        let tempId = "";
        let tempNama = "";

        updateUI();

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(850, ctx.currentTime);
                gainNode.gain.setValueAtTime(1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                osc.connect(gainNode); gainNode.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.15);
            } catch (e) { }
        }

        navigator.mediaDevices.enumerateDevices().then(devices => {
            const videoDevices = devices.filter(device => device.kind === 'videoinput');
            if (videoDevices.length > 0) {
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.textContent = device.label || `Kamera ${index + 1}`;
                    cameraSelector.appendChild(option);
                });
            }
        }).catch(err => console.error(err));

        cameraSelector.addEventListener('change', () => { if (isScanning) startCamera(cameraSelector.value); });

        function startCamera(cameraId) {
            if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); }
            navigator.mediaDevices.getUserMedia({ video: { deviceId: cameraId ? { exact: cameraId } : undefined, facingMode: "environment" } })
                .then(stream => {
                    currentStream = stream; videoElement.srcObject = stream; videoElement.play();
                    isScanning = true; scanButton.style.display = "none"; stopButton.style.display = "block"; scanLine.style.display = "block"; 
                    scanOffline();
                }).catch(err => alert('Gagal akses kamera: ' + err.message));
        }

        function stopCamera() {
            if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); videoElement.srcObject = null; }
            isScanning = false; scanButton.style.display = "block"; stopButton.style.display = "none"; scanLine.style.display = "none"; 
        }

        async function scanOffline() {
            if (!isScanning) return;

            // Jika modal sedang terbuka, abaikan hasil scan kamera
            if (isModalOpen) {
                requestAnimationFrame(scanOffline);
                return; 
            }

            if ("BarcodeDetector" in window) {
                const barcodeDetector = new BarcodeDetector({ formats: ["qr_code", "ean_13", "code_128"] });
                try {
                    const barcodes = await barcodeDetector.detect(videoElement);
                    if (barcodes.length > 0) {
                        const idData = barcodes[0].rawValue;
                        const dataDitemukan = dbAnggota[idData];
                            
                        if (!dataDitemukan) {
                            outputBox.className = "out-danger";
                            document.getElementById('output-nama').innerText = "⚠️ Ditolak: ID " + idData + " tidak terdaftar!";
                            outputBox.style.display = "block";
                            if (navigator.vibrate) navigator.vibrate([100, 100, 100]); 
                            
                            // Beri jeda sedikit agar tidak spam alert
                            isModalOpen = true; 
                            setTimeout(() => { isModalOpen = false; outputBox.style.display = "none"; }, 2000);
                        } else {
                            playBeep();
                            bukaModal(idData, dataDitemukan.nama || "Tanpa Nama");
                        }
                    }
                } catch (e) { }
            }
            requestAnimationFrame(scanOffline);
        }

        function bukaModal(id, nama) {
            isModalOpen = true; // Kunci scanner
            tempId = id;
            tempNama = nama;
            
            document.getElementById('m-nama').innerText = nama;
            document.getElementById('m-id').innerText = id;
            document.getElementById('m-qty').value = 1; // reset ke default 1
            
            modalOverlay.style.display = 'flex';
        }

        function tutupModal() {
            modalOverlay.style.display = 'none';
            // Beri jeda 1 detik sebelum scanner aktif lagi agar tidak langsung ke-scan ulang
            setTimeout(() => {
                isModalOpen = false;
                tempId = "";
                tempNama = "";
            }, 1000);
        }

        function simpanTransaksi() {
            const itemDipilih = document.getElementById('m-item').value;
            const jumlah = document.getElementById('m-qty').value;

            // Validasi: Cek apakah ID yang sama sudah meminjam barang yang sama
            const isDuplicate = trackingData.some(row => row.id === tempId && row.item === itemDipilih);
            
            if (isDuplicate) {
                alert(`Anggota ini sudah tercatat mengambil/meminjam ${itemDipilih}. Silakan pilih barang lain.`);
                return; // Stop fungsi, jangan disimpan
            }

            if (jumlah < 1) {
                alert("Jumlah minimal adalah 1");
                return;
            }

            const now = new Date();
            const timeString = now.toLocaleDateString('id-ID') + ' ' + now.toLocaleTimeString('id-ID');
            
            trackingData.push({ 
                id: tempId, 
                nama: tempNama, 
                item: itemDipilih,
                qty: jumlah,
                waktu: timeString 
            });
            
            localStorage.setItem('tracker_barang_v1', JSON.stringify(trackingData)); 
            
            updateUI();
            tutupModal();
        }

        function updateUI() {
            const list = document.getElementById('result-list');
            list.innerHTML = '';
            [...trackingData].reverse().forEach((row, index) => {
                let nomorUrut = trackingData.length - index;
                list.innerHTML += `
                <div class="log-item">
                    <span class="nama-teks">${nomorUrut}. ${row.nama}</span><br>
                    <span class="item-badge">📦 ${row.item} (Jumlah: ${row.qty})</span><br>
                    <span class="id-teks" style="margin-top:5px; display:inline-block;">ID: ${row.id} | ${row.waktu}</span>
                </div>`;
            });
        }

        function exportToCSV() {
            if (trackingData.length === 0) return alert("Belum ada data transaksi!");
            
            let csvContent = "data:text/csv;charset=utf-8,ID Anggota,Nama Anggota,Barang,Jumlah,Tanggal & Jam\n";
            
            trackingData.forEach(row => { 
                csvContent += `"${row.id}","${row.nama}","${row.item}","${row.qty}","${row.waktu}"\n`; 
            });
            
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const tanggalSekarang = new Date().toLocaleDateString('id-ID', options);
            const fileName = `Laporan Tracker Barang_${tanggalSekarang}.csv`;
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a"); 
            link.setAttribute("href", encodedUri); 
            link.setAttribute("download", fileName);
            document.body.appendChild(link); 
            link.click(); 
            document.body.removeChild(link);
        }

        function clearData() {
            if(confirm("Hapus semua riwayat tracker barang ini?")) {
                localStorage.removeItem('tracker_barang_v1');
                trackingData = [];
                updateUI();
            }
        }

        scanButton.addEventListener('click', () => startCamera(cameraSelector.value));
        stopButton.addEventListener('click', stopCamera);
        window.addEventListener('beforeunload', stopCamera);

    </script>
</body>
</html>
